models:
  - id: qwen2.5-0.5b-instruct
    name: Qwen2.5 0.5B Instruct
    family: qwen2.5
    quantization: ollama-default
    context_length: 32768
    memory:
      load_gb: 0.5
      note: Small Ollama model selected for local smoke tests and tool-calling-capable OpenCode experiments; KV cache/context memory is additional.
    backends:
      ollama:
        model: qwen2.5:0.5b-instruct
        limitations:
          - Very small model; useful for smoke tests but limited for real coding-agent quality.
      llama_cpp:
        gguf: /models/qwen2.5-0.5b-instruct.gguf
        limitations:
          - Provide a local GGUF path before using llama.cpp with this entry.
    opencode:
      compatible: true
      display_name: Qwen2.5 0.5B Instruct Local
      tool_calling: limited
      min_context_recommended: 8192
      notes:
        - Persistent smallest-model option for local OpenCode and tool-calling smoke tests.
